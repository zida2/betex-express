services:
  # Base de données PostgreSQL
  - type: pserv
    name: betex-postgres
    env: docker
    plan: free
    
  # Backend API
  - type: web
    name: betex-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: betex-postgres
          property: connectionString
    
  # Frontend React (serveur statique)
  - type: web
    name: betex-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://betex-backend.onrender.com/api/v1
      - key: GENERATE_SOURCEMAP
        value: false
